  <html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>第二关 | 平行宇宙的观测</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>
  <div class="container">
    
    <header>
      <h1>✨假如在某个平行宇宙里</h1>
      <p class="story">小小拾还在纠结他们的关系</p>
    </header>

    <div class="hypothesis-section">
      <p>H<sub>0</sub>：只是普通朋友吧</p>
      <p>H<sub>1</sub>：或许会不一样呢</p>
    </div>

    <div class="narrative">
      <p>起初她不敢奢望，只敢祈求 0.3 的概率</p>
      <p>但是，她观测到</p>
    </div>

    <div class="data">
      <p>那首《Stay Alive》他们都循环了好多次（D<sub>1</sub>=1.1）</p>
      <p>在雪山上，他会悄悄把手滑入她掌心（D<sub>2</sub>=1.4）</p>
      <p>两首不同版本的《Enchanted》某天好像成了他们共同的状态（D<sub>3</sub>=1.2）</p>
      <p>他们爪巴，徒步，探洞，环滇（D<sub>4</sub>=1.3）</p>
      <p>他们在高速上看过遍地金黄，也在欢乐谷被淋成落汤鸡（D<sub>5</sub>=1.14）</p>
    </div>

    <div class="action-section">
      <p class="question">她将算出的后验概率乘以 10，她笑了</p>
      <p>她想，她知道答案了</p>

      <div class="input-wrapper">
        <input type="text" id="answer" placeholder="输入小小拾的答案吧">
        <button onclick="checkAnswer()">提交</button>
      </div>
      
      <p class="format-tip">保留一位小数</p>
      <p id="result"></p>
    </div>

  </div>

  <script src="script2.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
